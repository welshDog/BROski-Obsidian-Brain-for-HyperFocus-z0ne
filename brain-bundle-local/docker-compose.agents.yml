services:
  agent-hyper-brain-core:
    build:
      context: ./agents/hyper-brain-core
      dockerfile: ./Dockerfile.hyper-brain-core
    environment:
      - AGENT_ID=hyper-brain-core
      - PORT=3301
      - REDIS_URL=redis://redis:6379
    networks:
      - agents-net
    ports:
      - 127.0.0.1:3301:3301
  agent-mcp-bridge:
    build:
      context: ./agents/mcp-bridge
      dockerfile: ./Dockerfile.mcp-bridge
    environment:
      - AGENT_ID=mcp-bridge
      - PORT=3302
      - REDIS_URL=redis://redis:6379
    networks:
      - agents-net
    ports:
      - 127.0.0.1:3302:3302
  agent-focus-tracker:
    build:
      context: ./agents/focus-tracker
      dockerfile: ./Dockerfile.focus-tracker
    environment:
      - AGENT_ID=focus-tracker
      - PORT=3303
      - DATABASE_URL=postgresql://postgres:hypercode@postgres:5432/hypercode
    networks:
      - agents-net
    ports:
      - 127.0.0.1:3303:3303
  agent-morning-briefing:
    build:
      context: ./agents/morning-briefing
      dockerfile: ./Dockerfile.morning-briefing
    environment:
      - AGENT_ID=morning-briefing
      - PORT=3304
      - REDIS_URL=redis://redis:6379
    networks:
      - agents-net
    ports:
      - 127.0.0.1:3304:3304
networks:
  agents-net:
    {}
