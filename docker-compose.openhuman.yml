# docker-compose.openhuman.yml
#
# OpenHuman Container — Unified memory sync for GitHub, Gmail, Slack
# Integrates with BROski-Obsidian-Brain vault
#
# Builds OpenHuman from source (image not public yet)
# First run: ~5-10 min build. Cached after that.
#
# Usage:
#   docker compose -f docker-compose.openhuman.yml up -d --build
#   docker compose -f docker-compose.openhuman.yml up -d openhuman-sync
#
# BROski♾️

services:
  openhuman:
    build:
      context: ./openhuman-build
      dockerfile: Dockerfile
    image: openhuman:local
    container_name: openhuman-ui
    ports:
      - "127.0.0.1:3210:3210"
    environment:
      - OPENHUMAN_WORKSPACE=/vault
      - TZ=Europe/London
      # - OPENHUMAN_API_KEY=${OPENHUMAN_API_KEY}
      # - OPENHUMAN_HEADLESS=true
    volumes:
      - ${VAULT_PATH:-.}/HYPERFOCUS_ZONE/00-Inbox/OpenHuman-Feed:/vault/00-Inbox/OpenHuman-Feed
      - openhuman-config:/root/.openhuman
      - ${VAULT_PATH:-.}:/vault
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3210/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "com.hyperfocuszone.service=openhuman"
      - "com.hyperfocuszone.tier=integration"
      - "com.hyperfocuszone.version=0.57.13"
    networks:
      - app-net

  openhuman-sync:
    build:
      context: ./openhuman-build
      dockerfile: Dockerfile
    image: openhuman:local
    container_name: openhuman-sync
    command: ["openhuman", "--sync-only", "--headless"]
    environment:
      - OPENHUMAN_WORKSPACE=/vault
      - OPENHUMAN_SYNC_INTERVAL=1200
      - TZ=Europe/London
      # - OPENHUMAN_API_KEY=${OPENHUMAN_API_KEY}
    volumes:
      - ${VAULT_PATH:-.}/HYPERFOCUS_ZONE/00-Inbox/OpenHuman-Feed:/vault/00-Inbox/OpenHuman-Feed
      - openhuman-config:/root/.openhuman
      - ${VAULT_PATH:-.}:/vault
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "test", "-f", "/root/.openhuman/sync.lock"]
      interval: 60s
      timeout: 10s
      retries: 3
    labels:
      - "com.hyperfocuszone.service=openhuman-sync"
      - "com.hyperfocuszone.tier=integration"
    depends_on:
      - openhuman
    networks:
      - app-net

volumes:
  openhuman-config:
    driver: local

networks:
  app-net:
    driver: bridge
    external: false
