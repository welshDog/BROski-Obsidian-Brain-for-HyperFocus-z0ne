name: Graph Refresh

# Auto-refresh the notes layer of the canonical memory-hub artifact
# (HYPERFOCUS_ZONE/06-AI-Context/graph.json) whenever vault notes change.
# Loop-safe: the bot commit only touches graph.json, which never matches
# the .md paths filter below.

on:
  push:
    branches: [main]
    paths:
      - "HYPERFOCUS_ZONE/**/*.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rebuild notes layer
        run: python graph_builder.py

      - name: Commit if changed
        run: |
          if git diff --quiet HYPERFOCUS_ZONE/06-AI-Context/graph.json; then
            echo "graph.json unchanged — nothing to do"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add HYPERFOCUS_ZONE/06-AI-Context/graph.json
            git commit -m "chore: auto-refresh graph.json notes layer [skip ci]"
            git pull --rebase origin main
            git push
          fi
