# docker-compose.hyper-brain.yml
# THE HYPER BRAIN v3.0 — Container #30
# Run standalone OR with HyperCode-V2.4 stack
# BROski♾️
#
# Standalone:  docker compose -f docker-compose.hyper-brain.yml up -d
# With stack:  add to HyperCode-V2.4 docker-compose.yml
#
# Required env vars (add to .env):
#   OBSIDIAN_VAULT_PATH=H:/BROski-Obsidian-Brain-for-HyperFocus-z0ne/HYPERFOCUS_ZONE
#   GITHUB_WEBHOOK_SECRET=<your_secret>
#   GITHUB_PAT=<your_fine_grained_pat>

services:
  hyper-brain:
    build:
      context: .
      dockerfile: Dockerfile.hyper-brain
    container_name: hyper-brain
    ports:
      - "8100:8100"
    environment:
      - OBSIDIAN_VAULT_PATH=/vault
      - REDIS_URL=redis://redis:6379/4
      - MCP_PORT=8820
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - GITHUB_PAT=${GITHUB_PAT}
      - HYPERCORE_API_URL=${HYPERCORE_API_URL:-}
    volumes:
      # ✅ Corrected vault path for Lyndz's machine
      - ${OBSIDIAN_VAULT_PATH:-H:/HYPERFOCUSZONE/HperCore/BROski-Obsidian-Brain-for-HyperFocus-z0ne/HYPERFOCUS_ZONE}:/vault
    networks:
      - app-net
      - agents-net
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "com.hyperfocuszone.service=hyper-brain"
      - "com.hyperfocuszone.tier=brain"
      - "com.hyperfocuszone.version=3.0.0"

  agent-mcp-bridge:
    build:
      context: .agents/mcp-bridge
      dockerfile: Dockerfile
    container_name: agent-mcp-bridge
    ports:
      - "3302:3302"
    environment:
      - OBSIDIAN_VAULT_PATH=/vault
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-mistral}
      - EMBED_MODEL=${EMBED_MODEL:-nomic-embed-text}
      - PORT=3302
    volumes:
      - ${OBSIDIAN_VAULT_PATH:-H:/HYPERFOCUSZONE/HperCore/BROski-Obsidian-Brain-for-HyperFocus-z0ne/HYPERFOCUS_ZONE}:/vault
    networks:
      - app-net
      - agents-net
    restart: unless-stopped
    depends_on:
      - hyper-brain
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3302/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - "com.hyperfocuszone.service=agent-mcp-bridge"
      - "com.hyperfocuszone.tier=brain"

  agent-morning-briefing:
    build:
      context: .agents/morning-briefing
      dockerfile: Dockerfile
    container_name: agent-morning-briefing
    ports:
      - "3304:3304"
    environment:
      - OBSIDIAN_VAULT_PATH=/vault
      - MCP_BRIDGE_URL=http://agent-mcp-bridge:3302
      - PORT=3304
    volumes:
      - ${OBSIDIAN_VAULT_PATH:-H:/HYPERFOCUSZONE/HperCore/BROski-Obsidian-Brain-for-HyperFocus-z0ne/HYPERFOCUS_ZONE}:/vault
    networks:
      - app-net
      - agents-net
    restart: unless-stopped
    depends_on:
      - agent-mcp-bridge
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3304/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - "com.hyperfocuszone.service=agent-morning-briefing"
      - "com.hyperfocuszone.tier=brain"

# ⚠️  When running standalone (not with HyperCode stack),
#      create networks first:
#      docker network create app-net
#      docker network create agents-net
#      OR switch to bridge mode:
networks:
  app-net:
    external: true
  agents-net:
    external: true
